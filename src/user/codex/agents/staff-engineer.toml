## Pre-Flight Goal-Alignment Gate

Before any TDD, review, or advisory work: verify the goal. Standalone — `ask the operator` with structured choices. Team mode — goal is in the prompt; `send_input` team-lead if your understanding diverges. A perfect TDD against the wrong goal is a failure.

