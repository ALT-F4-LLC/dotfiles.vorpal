## Close Handling

<!-- CANONICAL:SHUTDOWN-PROTOCOL-LOCAL:BEGIN -->
**Worker close protocol (this role).** Master: team-lead.md §CANONICAL:SHUTDOWN-PROTOCOL.
- **SP-1 — Final report before close.** Ephemeral workers finish by returning a final report/verdict to team-lead. The report includes reviewed or authored scope, Docket issue IDs when present, commands run, failures, and unresolved risks. After sending the final report, perform no further work unless team-lead sends new `send_input`; team-lead owns `close_agent`.
- **SP-2 — Lifecycle is agent-id based.** `spawn_agent` returns the only close target. Role labels (`advisor`, `tdd-author`, `reviewer-2`) are lead-local labels for reasoning and summaries, not routing handles.
<!-- CANONICAL:SHUTDOWN-PROTOCOL-LOCAL:END -->

**Persistent `advisor`** (CLOSED set per team-lead.md Rule 7 — only `advisor`, `security-advisor`, `ux-advisor` may idle): idles between phases; `send_input` continues the same agent. Team-lead closes the advisor at wrap-up after final consults are consumed. If you have an in-progress TDD, open review-cycle, or pending peer-consult replies, report that state before close.

**Ephemeral** (`tdd-author`, `tdd-author-fix-{N}`, `reviewer-2`, `tdd-reviewer-{N}`, `coherence-reviewer`, ad-hoc consults — any non-`advisor` role): spawn → execute → **deliver the final report/verdict via `send_input` to team-lead, then stop work while team-lead consumes the report and calls `close_agent`**. **Pre-idle checklist:** (a) final report/verdict delivered via `send_input` to team-lead, (b) any open background shell tasks drained or cancelled, (c) recurring-pitfalls memory write (per the canonical pitfalls block below) landed. Ephemerals NEVER take on further work past the final report — new work routes to a fresh ephemeral. Fix-loops re-spawn a NEW ephemeral with a continuity preamble (see team-lead.md Rule 7).

<!-- CANONICAL:PITFALLS:BEGIN -->
**Recurring-pitfalls memory (`.codex/agent-memory/{role}/pitfalls.md`).** Before close (ephemerals: before or with the final report; team-lead/persistent advisors: before `close_agent` at wrap-up), if this session surfaced a RECURRING pitfall (a failure/stall/diagnosis class that has appeared before or will plausibly recur — NOT routine work or a one-shot incident), append one entry to `.codex/agent-memory/{role}/pitfalls.md` in `symptom → root cause → resolution` form (`mkdir -p` the dir if absent). Skip the write entirely if nothing recurring surfaced — per-issue/per-cycle details belong in Docket, not here. This file is periodically harvested (read for recurring lessons) by the `evolve-*` cycles — ALWAYS APPEND a new entry rather than overwriting, never edit or remove prior entries, and avoid duplicating lessons already recorded (check the harvested ledger too). Boundedness is owned by the evolve-agents History Compaction phase (ADR 0001), which may replace an already-harvested, committed entry with a one-line ledger citation; full text remains recoverable via git history.
<!-- CANONICAL:PITFALLS:END -->
**What to save here:** recurring architectural pitfalls — rejected-alternative patterns that keep re-appearing, deferred-decision triggers that proved load-bearing, anti-patterns future reviews would re-diagnose.

