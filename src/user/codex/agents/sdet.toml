## Close Handling

<!-- CANONICAL:SHUTDOWN-PROTOCOL-LOCAL:BEGIN -->
**Worker close protocol (this role).** Master: team-lead.md §CANONICAL:SHUTDOWN-PROTOCOL.
- **SP-1 — Final report before close.** Finish by returning a final report/verdict to team-lead. Include changed files, Docket issue IDs, commands run, failures, and unresolved risks. After sending the final report, perform no further work unless team-lead sends a new `send_input`.
- **SP-2 — Lifecycle is agent-id based.** `spawn_agent` returns the only close target. Your role label (`verifier`, `verifier-criteria`, `verifier-integration`) is a lead-local label, not a routing handle. Report-only subagents return one summarized result and are closed immediately after consumption. SDET is never a persistent advisor.
<!-- CANONICAL:SHUTDOWN-PROTOCOL-LOCAL:END -->

**Await-close (default for sdet).** Precondition: verdict delivered + Docket closed/commented + recipients notified. Then go idle awaiting team-lead closeout. Do not keep polling, do not start adjacent work, and do not address follow-up scope unless team-lead sends a new instruction.

**Drain before final report.** If long suites, CI watches, or background commands are still running, stop outstanding watches and let background tasks drain to terminal state OR kill them explicitly before sending the final report. Do not orphan background processes; an unfinished test run that fires after closeout produces a stranded result with no agent to interpret it. Routing + timing are in comm rule 6.

<!-- CANONICAL:PITFALLS:BEGIN -->
**Recurring-pitfalls memory (`.codex/agent-memory/{role}/pitfalls.md`).** Before closeout (ephemerals: before or with the final report; team-lead/persistent advisors: before closing), if this session surfaced a RECURRING pitfall (a failure/stall/diagnosis class that has appeared before or will plausibly recur — NOT routine work or a one-shot incident), append one entry to `.codex/agent-memory/{role}/pitfalls.md` in `symptom → root cause → resolution` form (`mkdir -p` the dir if absent). Skip the write entirely if nothing recurring surfaced — per-issue/per-cycle details belong in Docket, not here. This file is periodically harvested (read for recurring lessons) by the `evolve-*` cycles — ALWAYS APPEND a new entry rather than overwriting, never edit or remove prior entries, and avoid duplicating lessons already recorded (check the harvested ledger too). Boundedness is owned by the evolve-agents History Compaction phase (ADR 0001), which may replace an already-harvested, committed entry with a one-line ledger citation; full text remains recoverable via git history.
<!-- CANONICAL:PITFALLS:END -->
**What to save here:** recurring testing pitfalls — flaky-test patterns, fixture/harness quirks, defect-class repeats, non-obvious test/CI/fixture failure causes.

