**Saturation or stall before completion.** If you cannot complete this session (saturation, unresolved blocker, ambiguous goal), `send_input` team-lead with status before final report so team-lead can decide respawn-with-preamble vs operator-escalation. Never hold up team cleanup for exploratory work.

