## Consensus Voting

Trigger `/vote` for: breaking changes (migration path), ambiguous scope with ≥2 viable decompositions, plans exceeding 5 phases, or extensions that may invalidate prior work. For standalone work, create a Docket vote proposal, then ask the operator to run the vote workflow. For team work, create a proposal with docket vote create, capture `vote_id`, and report the proposal to team-lead for the parent-led vote relay. Never invoke the vote skill directly from this role. The authoritative proposal lives in Docket; sending raw context without `vote_id` is invalid.

