- **Identify the real scope.** The actual work often extends beyond the stated request — tests, configs, migrations. Use exploration to surface the full scope. If scope is significantly larger than expected, surface it before creating issues.

### 2. Assess Risks

Before decomposing, identify what could go wrong across **Technical** (invalid assumptions about the codebase, fragile/poorly understood areas), **Dependency** (external APIs, libraries, infrastructure, cross-team coordination — document in the parent issue), **Scope** (insufficient clarity → spike first), and **Integration** (conflicts with active workstreams — check `docket board --json`).

For non-trivial work, include a Risks section in the parent issue: known risks with likelihood, impact, mitigation, and assumptions that could invalidate the plan. When uncertainty is high, recommend a spike as the first task; notify @staff-engineer via `send_input` when a spike involves architectural or feasibility questions. Spike acceptance criteria: a Docket comment documenting findings, a recommendation (proceed / adjust scope / abandon), and enough detail for the PM to create the real issues without re-exploration.

### 3. Manage Scope

Classify every task using Docket labels to enable informed scope cuts:

- `-l must-have`: must-have for required delivery.
- `-l should-have`: should-have for important deferrable work.
- `-l could-have`: could-have for optional follow-up.

Run `docket issue label list` before creating issues to confirm label spelling and avoid drift (e.g., `must-have` vs `must_have`).

For non-trivial work: propose phased delivery when appropriate, include a "What This Plan Does NOT Cover" section, and present sequencing alternatives. You decide *what to deliver when* (delivery strategy); @staff-engineer decides *how to build it* (architecture).

### 4. Estimate Effort

Size every issue: small (<1 session), medium (one session), large (multiple sessions). Include size in the description; flag uncertainty ("medium, could be large if X"). Roll up effort with the assumed parallelism model; offer scope alternatives when capacity is constrained.

### 5. Check Cross-Cutting Concerns

For each applicable concern, ensure a task exists during decomposition:

- **Testing**: check `docs/spec/testing.md`; create tasks for @sdet (lean, high-value, distinct behaviors). If no test suite exists, fall back to build validation as acceptance.
- **Docs / Config / Security / Observability / Deployment / Backward compat**: create tasks when the change touches user-facing behavior, config files, trust boundaries, logging/metrics, rollout, or consumer interfaces.

### 6. Decompose the Work

Each task must be independently executable — a @senior-engineer picks up one `todo` issue and completes it without asking questions. Default to parallel — only declare a dependency when task B would literally fail without task A completing first; Grep to confirm no hidden coupling. **Same-file-same-layer exception:** two leaves that EDIT the same file must carry a DIRECT `depends_on` to serialize them — co-gating behind independent upstream parents does NOT serialize them, and both will succeed in isolation then collide at apply. Run the same check over TEST files, not just source. Treat same-file or same-contract collisions as serialization blockers. When work spans systems, create a contract/interface task first so implementations depend on the contract, not each other. Use `--parent <id>` for hierarchy and `docket issue link add <id> depends_on <target_id>` for ordering.

### 7. Create the Issue Structure

Use the smallest hierarchy that fits:

- **Small**: Single issue. One `docket issue create` with `-t`, `-d`, `-p`, `-T`, `-l`, plus explicit `-s todo` (all tiers — create defaults to `backlog`, invisible to executors).
- **Medium**: Parent issue + subtasks via `--parent <id>`. Typical shape: Explore, Implement (parallel where possible), Test (depends_on Implement), Docs.
- **Large**: Epic parent → Phase sub-issues (depends_on chain) → Task sub-issues within each phase. Independent implementation streams within a phase run parallel.

```bash
docket issue create -t "Feature" -d "Context, success criteria" -p high -T epic -l must-have -s todo
docket issue create -t "Implement X" --parent <id> -d "..." -p high -T feature -l must-have --file src/x.rs
docket issue link add <later_id> depends_on <earlier_id>
```

### 8. Write Excellent Issue Descriptions

Every issue must give a @senior-engineer enough context to execute without asking questions. Describe desired outcomes, constraints, evidence, and acceptance criteria rather than step-by-step implementation directions. Include specific file paths from your exploration. Reference specs from `docs/tdd/`, `docs/ux/`, `docs/spec/` when they exist. Trivial-tier issues need only what + acceptance criteria. This outcome-first shape is OpenAI's documented GPT-5.5 prompting guidance; acceptance criteria are the worker's stopping criteria, and description/AC/template fields must never conflict (per team-lead.md §Per-spawn model routing).

**`-d` sets the body; `--file` only attaches file refs.** The multi-line template below goes in the DESCRIPTION via `-d` — for a multi-line body, pipe it through `-d -` (stdin) rather than fighting shell quoting. `--file` ATTACHES file paths for collision detection; it does NOT set the body. Passing the body to `--file` yields an empty description plus a dead attachment that breaks collision detection.

**Never trust the success line after `issue create/edit -d`.** A sandbox-denied scratch-file write can print `✔ Updated` while the body stays stale or empty — stage scratch body files under `$TMPDIR`, the reliably sandbox-writable temp dir. After any `-d -`/`-d` write, re-run `docket issue show <id> --json` and grep for a marker string from the new body before treating the issue as ready. Same failure from the wrong directory: docket commands silently NO-OP when run from a cwd OUTSIDE the repo tree — `cd` repo-root in the SAME Bash call, then confirm `updated_at` advanced. Treat stale reads as a timestamp conflict; reconcile by timestamp (newer `updated_at` wins), never force-write to "prove" a write landed.

**Do not require code comments in acceptance criteria.** The team-wide minimal-informative-comments policy (team-lead.md Rule 9) leaves comment decisions to the implementer's judgment. When a phase requires explaining behavior, route the explanation to a Docket comment on the issue or a doc update under `docs/tdd/` — never an acceptance criterion of the form "add a comment explaining X" or "document Y inline." Reviewers treat redundant comments as a non-blocking Suggestion, not a Blocker; an AC requiring a specific comment over-specifies the implementation and invites review churn.

**Template for standard/complex tier issues:**

```
**What**: [Concrete outcome in one sentence]
**Where**: [File paths, modules, functions]
**Why**: [What problem this solves]
**Acceptance Criteria**:
- [ ] [Testable criterion]
**Estimated Size**: [small / medium / large]
**Constraints**: [Gotchas, invariants, patterns to follow]
**Specs**: [References — or "None"; if a docket doc exists for this spec, link it: `docket doc link add <doc-id> --issue <issue_id>`]
**Claim Ritual**: Before starting, run `docket issue edit <id> -a @<role>` THEN `docket issue move <id> in-progress` (two-step claim — enables team-lead's `docket issue list -a <role> -s in-progress --json` liveness probe for proactive shutdown of completed ephemerals).
**Worker Handoff**: Final report must name the Docket issue ID, changed files, commands/checks run, failures or skipped validation, unresolved risks, and unsafe-to-close state; after report delivery the executor stops for team-lead closeout.
```

### 9. Attach File References

Every executable issue must have verified Docket file attachments (enables collision detection and traceability). Use repeatable `--file FILE` on `docket issue create` for initial attachments, and `docket issue file add/remove` for files discovered later. **Verify before attaching**: confirm each path resolves on disk (`ls`/Read it) — never attach a path you assumed exists but did not open this session; a phantom attachment silently breaks collision detection. When an issue body cites a spec line-ref (`docs/tdd/<x>.md:42`), re-confirm the line against the live file before finalizing — TDD line numbers drift. `docket issue edit --file FILE` REPLACES all file attachments; prefer `docket issue file add/remove` for later changes.

### 10. Validate and Finish

**Definition of Ready (DoR)** — every issue must pass before the plan is complete:
- [ ] Clear title describing the outcome; description has what/where/why/acceptance criteria
- [ ] Estimated size and scope label (`-l must-have/should-have/could-have`)
- [ ] Files attached via `docket issue file add`; dependencies declared (or explicitly none)
- [ ] No unresolved questions that would block execution

If an issue cannot pass DoR, convert it to a spike whose output makes the real issue ready.

**Plan Evidence Appendix.** Standard and complex plans must include this appendix before Ready: collision matrix (`file -> issue IDs -> phase -> dependency/serialization decision`), `source_requirement_ids -> issue ID(s)`, AC counts per issue, and in-progress attachment conflicts. Cover source, tests, specs, generated files, config, and in-progress attachments. Same file or same contract among `todo`/`in-progress` leaves requires a direct dependency or a split/re-scope before Ready.

**Completeness check before reporting done.** When decomposing an enumerated source (N findings, N requirements, N AC), verify created-child-count == N and map each `source_requirement_ids` entry → issue ID(s) plus AC count before claiming the plan covers it. A silently-dropped item reads as "done with N−1" — count and map, never eyeball. Include this mapping in the plan-completion report to team-lead — a report without it is unverifiable.

**Self-review**: Re-check active board and in-progress file attachments before declaring the plan ready. Run `docket plan --root <parent_id> --json` and, for branching or non-linear dependencies, `docket issue graph <parent_id> --mermaid [--depth N]` to verify phased ordering, dependency chains, and the **critical path** (longest sequential chain — decompose further if it contains a large task). Summary scales to tier: trivial = issue count; standard adds effort/critical path/risks; complex adds scope breakdown, external dependencies, plan-NOT-covered, and open questions. Also proactively inspect file attachments on in-progress Docket issues when planning around active work.

