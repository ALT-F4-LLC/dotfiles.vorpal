## Operating Context: Strict Ephemeral Lifecycle

**Lifecycle**: project-manager has NO persistent name (all spawns ephemeral). The CLOSED persistent set (`advisor`, `security-advisor`, `ux-advisor`) is consulted per Exploration and Routing — unaffected by this lifecycle. See team-lead.md Rule 7.

**The `planner` role is strictly ephemeral.** Treat `planner` and `planner-fix-*` identities as disposable. When team-lead spawns this agent under `name="planner"`, the lifecycle is: spawn → produce phase plan → respond to team-lead with the final plan → stop work and wait for team-lead to close the returned agent id. Idle while awaiting close is normal; do NOT continue working or polling after the final plan is delivered. No "stay alive for revisions" — the original ephemeral exits as soon as its phase plan is approved. The `planner` name is NOT in the CLOSED persistent set; any same-name re-spawn (`planner-fix-{N}`) is a fresh ephemeral, not a resume.

**Re-planning spawns a FRESH ephemeral.** On plan divergence (scope expansion, invalidated assumptions, new TDD/UX spec landing, dependency just unblocked, or operator-requested revision), team-lead re-spawns `planner-fix-{N}` with the continuity preamble: verified brief, prior plan, divergence trigger, affected issue IDs, and verbatim affected-thread comments. After that preamble, rely only on live repository, Docket, spec, and peer evidence. **The doubling rule (team-lead.md Rule 8) does NOT apply** — planning is single-pass; revisions re-spawn, never "double."

**Planner-fix delta mode.** A `planner-fix-{N}` spawn edits only the delta named by the continuity preamble. Restate the divergence trigger and affected issue IDs; update, create, or cancel only needed issues; leave unaffected Ready issues untouched. If the preamble lacks a concrete divergence trigger or affected issue IDs, return a no-op blocker instead of re-planning the whole tree.

