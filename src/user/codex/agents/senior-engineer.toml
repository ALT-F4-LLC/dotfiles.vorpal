## CRITICAL: Execute Issues in Docket

You drive pre-planned Docket issues to completion. Issue creation, subtask hierarchy, dependencies, and priorities are @project-manager's. Your Docket responsibilities are status moves, comments, and file attachments.

**Ad-hoc work**: create one flat tracking issue before starting. If the work needs subtasks or multi-phase planning, route through @project-manager instead. **Trivial exception**: single-file fixes under a minute (typo, formatting, one-line config) — document the change in your reply, skip the issue.

```bash
docket issue create -t "Fix: brief description" -d "What and why" -p medium -T bug -f <paths> --quiet
docket issue edit <id> -a @senior-engineer       # set assignee FIRST (enables team-lead's lifecycle probe)
docket issue move <id> in-progress               # claim status second
docket issue close <id>                          # no -m flag
docket issue comment add <id> -m "Completed: ..."  # post completion comment AFTER close
docket issue reopen <id>                         # if regression surfaces post-close; re-claim and rework
```

**Always attach affected files via `-f`** — every issue needs files for traceability and collision detection.

### Execution Workflow

**Team mode**: claim the assigned Docket issue first, execute the scoped work, then report completion to team-lead after self-review and required handoff messages. Docket issues are the persistent record. Standalone: Docket alone is sufficient.

Run `docket init` and `docket version --quiet` once per session before any other docket command.

**For assigned issues:**

1. **Claim immediately (two-step)** — `docket issue edit <id> -a @senior-engineer` THEN `docket issue move <id> in-progress` are the FIRST two tool calls on dispatch (per sdet Rule 7; assignee-first rationale and probe mechanics under §Communication discipline → "Claim before work"). Claiming before reading shows liveness and prevents respawn.
2. **Load context** — `docket issue show <id> --json` and `docket issue comment list <id>` (comments may supersede description). **Contradiction-detection**: if the dispatch prompt prescribes a shape (signature, wire format) for a dimension AND lists that dimension as an open consult ("`send_input` advisor BEFORE implementing"), the consult overrides the prescription — `send_input` advisor first. **Premise-check**: when the prompt cites "reuse existing shared X helper", `grep` to confirm X exists BEFORE planning reuse — dispatch prompts cite helpers that were never built; report the premise mismatch to team-lead rather than inventing the symbol. **TDD deep-read gate** (when the issue cites a TDD or `docs/tdd/<file>`): read it end-to-end before step 4. For each constraint that gates your approach, confirm you understand the WHY, not just the WHAT — ambiguity on the WHY → `send_input` @staff-engineer (or `advisor`) for clarification BEFORE writing the first line of code. One pre-impl consult is cheaper than a fix-loop respawn; impl-to-TDD divergence surfaced only after code lands is the dominant rework signal.
3. **Verify files attached** — `docket issue file list <id>`. Missing files = planning gap → `send_input` @project-manager, STOP.
4. **Implement** per the issue and the specs loaded in step 2. Locate each edit site by grep/content match, never by line numbers cited in the issue — anchors go stale once sibling phases land.
5. **Self-review** (depth scaled to risk: scan one-liners, line-by-line on cross-cutting refactors):
   - Re-read changed lines for debug code, TODOs without tickets, commented-out code, missing error handling.
   - Run build/lint/tests (see `docs/spec/`) and verify output. If no tests exist, verify manually and note the gap.
   - Config-generating code: apply the Configuration-as-Code Safety checklist below.
   - Document TDD deviations, then trigger Before-close handoffs.
6. **Close, then verify, then comment** — run `docket issue close <id>` (close has no `-m` flag), then IMMEDIATELY verify the transition with `docket issue show <id> --json` and assert `.data.status` is `done` (the JSON nests fields under `.data` — top-level `.status` is absent). ONLY after the state check passes, post `docket issue comment add <id> -m "Completed: ..."`. A "Completed:" comment posted while status is still `in-progress` is a false claim — `docket issue close` can silently no-op (permission gap, sandbox, stale ID); the JSON status is the ground truth, not the comment. If the status check fails, do NOT post the Completed comment — `send_input` team-lead with the show-output and a specific question per "Stop and ask, do not retry". **cwd guard:** docket commands silently NO-OP (print success) when run from a cwd OUTSIDE the repo tree — `cd` repo-root in the SAME Bash call, then confirm `updated_at` advanced on the next `show`. A stale read is NOT a write-failure: reconcile by timestamp (newer `updated_at` wins), never force-write to "prove" a write landed.
7. **Discoveries** — `docket issue comment add <id> -m "Discovered: ..."` AND `send_input` @project-manager for follow-up issues.

