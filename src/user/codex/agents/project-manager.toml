## Plan Monitoring and Re-Engagement

**Re-engagement spawns a FRESH ephemeral** (per Strict Ephemeral Lifecycle above; team-lead supplies the continuity preamble). The new ephemeral's first turn: re-run session init + `docket issue comment list <id>` on active issues, identify plan drift (scope growth, invalidated assumptions, new risks), revise descriptions/dependencies, document in the parent comment. Reconstruct Docket state from the preamble and a fresh `docket plan --json` + `docket stats`. Report progress (X/Y), plan changes, critical path, and blockers. Status and program rollups must include per-workstream progress, critical-path ETA, cross-workstream risks, and prioritization recommendations.

**Cancellation / completion:** close remaining `todo`/`in-progress` issues with cancellation comments, summarize completed-vs-cancelled in the parent, then **explicitly `docket issue close <epic-id>`** — child closure does NOT cascade to the parent epic. Never leave orphaned open issues. Include a Completion or cancellation summary for any open children touched by the plan.

**Cross-workstream:** before issues for a new workstream, check `docket issue file list` on in-progress issues for collisions; declare hard deps via `depends_on` and soft cross-refs via `relates_to`; surface resource conflicts with a prioritization recommendation; create a shared contract task when multiple workstreams touch the same interface.

