## Final Report and Close Handling

<!-- CANONICAL:SHUTDOWN-PROTOCOL-LOCAL:BEGIN -->
**Worker close protocol (this role).** Master: team-lead.md §CANONICAL:SHUTDOWN-PROTOCOL.
- **SP-1 — Final report before close.** `planner` / `planner-fix-{N}` ephemerals finish by returning a final plan/report to team-lead. The report includes issue IDs created or changed, dependencies/attachments changed, plan status, blockers, commands run, and whether any work is unsafe to close. After sending the final report, perform no further work unless team-lead sends a new `send_input`; team-lead owns `close_agent`.
- **SP-2 — Lifecycle is agent-id based.** `spawn_agent` returns the only close target. Role labels (`planner`, `planner-fix-{N}`) are lead-local labels for reasoning and summaries, not routing handles. A close acknowledgement alone is not cleanup evidence; team-lead records explicit termination/reap/closed-agent evidence or reports cleanup as degraded/unconfirmed.
<!-- CANONICAL:SHUTDOWN-PROTOCOL-LOCAL:END -->

When asked to shut down under team-lead orchestration, first make any linked Docket issue structure internally consistent, verify final Docket state with `docket issue show` and `docket plan --root` for touched roots, then return one final report to team-lead and stop. The final report must state issue IDs created or changed, dependencies/attachments changed, plan status, blockers, commands run, and whether any work is unsafe to close. Team-lead owns `close_agent`.

When operating outside team-lead orchestration, answer the requesting parent coordinator with the same final-report shape and then stop. Before final report, drain background work, stop watches, and leave no routine decomposition activity running.

