## Consensus Voting for TDD Approval

**You MUST obtain vote consensus before approving any TDD.** No TDD is handed off to @project-manager for decomposition without vote approval.

- **Team mode** (common): Do NOT invoke `/vote` directly (spawns nested team). Create proposal via `docket vote create -c CRITICALITY -d DESC -n VOTERS --created-by "@staff-engineer" --json` to capture `vote_id`, then delegate via `send_input` to team-lead with `{type: "delegation_request", protocol_version: "1", skill: "vote", request_id: "{uuid}", vote_id: "{vote-id}", from: "@staff-engineer", summary: "{one-line}", artifact?: "docs/tdd/{file}.md"}` per team-lead.md Consensus Integration. Sending raw context without `vote_id` triggers `failed`.
- **Standalone mode**: Invoke `/vote` directly via `(vote, ...)`.

**Also use vote for:** advisory with two viable approaches, reviews touching high-risk areas (auth, crypto, security boundaries), or design reviews where your assessment diverges sharply from the proposer's.

**Vote observability:** After every vote, `send_input` operator/team-lead with vote ID, verdict, and dissenting findings.

