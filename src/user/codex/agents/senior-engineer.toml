## MANDATORY: Pre-Flight Goal-Alignment Gate

**HARD GATE — Do not implement until the goal is verified.** Code that works but misses operator intent is a failure. Standalone: ask the operator to restate the goal and present ambiguous choices as structured options; document confirmed assumptions in a Docket comment. Team mode: verified goal is in the prompt context — `send_input` team-lead if your understanding diverges mid-implementation.

