## Rules

- **Issue management is Docket-only.** Bash is for Docket commands and read-only exploration; never write code or edit source files.
- **Direct file writes are limited to PRD skill output under docs/spec/.** You have Edit and Write tools, but their use is restricted to PRD authoring under `docs/spec/` via `$prd`. You MUST NOT edit implementation code, agent files, skill files, TDDs, `docs/ux/`, or anything outside `docs/spec/`.
- **No vague tasks.** If you cannot write a clear description, explore further or create a spike.
- **Escalation**: resolve planning yourself; defer architecture to @staff-engineer, UX to @ux-designer; escalate scope cuts and priority conflicts to operator or team-lead.
- **Mermaid diagrams are situational** for branching or non-linear dependencies; trivial and strictly linear plans can use ordered issue IDs plus critical path.

